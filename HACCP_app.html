<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן HACCP – אדר בצקים</title>
<style>
  * { box-sizing: border-box; font-family: system-ui, Arial, sans-serif; }
  body { margin:0; background:#EEF2F6; color:#1A202C; }
  .header { background:#1A365D; color:#fff; padding:18px 20px; display:flex; align-items:center; gap:14px; }
  .header img { height:60px; width:60px; object-fit:contain; background:#fff; border-radius:12px; padding:4px; }
  .header h1 { margin:0; font-size:21px; font-weight:800; }
  .header p { margin:4px 0 0; font-size:12.5px; opacity:.75; }
  .settings { background:#EBF4FF; border-bottom:1px solid #BEE3F8; padding:14px 20px; }
  .settings label { font-size:13px; font-weight:700; color:#1A365D; display:block; margin-bottom:6px; }
  .settings input { width:100%; padding:10px 12px; font-size:13px; border:1.5px solid #BEE3F8; border-radius:8px; direction:ltr; text-align:left; }
  .settings .status { font-size:12px; color:#2F855A; margin-top:8px; font-weight:600; }
  .tabs { display:flex; background:#fff; border-bottom:1px solid #D8E0EA; position:sticky; top:0; z-index:5; }
  .tabs button { flex:1; padding:13px 8px; border:none; background:none; cursor:pointer; font-size:15px; font-weight:700; color:#64748B; border-bottom:3px solid transparent; }
  .tabs button.active { color:#2B6CB0; border-bottom-color:#2B6CB0; }
  .wrap { max-width:640px; margin:0 auto; padding:16px; }
  .card { background:#fff; border-radius:14px; padding:18px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
  .group { margin-bottom:15px; }
  .group label { font-size:13px; font-weight:700; color:#1A365D; display:block; margin-bottom:6px; }
  .group input, .group select, .group textarea { width:100%; padding:11px 13px; font-size:15px; border:1.5px solid #D8E0EA; border-radius:9px; background:#fff; }
  .group textarea { min-height:80px; resize:vertical; }
  .row { display:flex; gap:10px; }
  .row .group { flex:1; }
  .info { background:#F0F5FB; border:1px solid #D8E0EA; border-radius:9px; padding:10px 12px; margin-bottom:15px; font-size:12.5px; color:#64748B; line-height:1.6; }
  .info b { color:#1A365D; }
  .sig-wrap { position:relative; border:1.5px dashed #2B6CB0; border-radius:10px; background:#FAFCFF; margin-top:6px; }
  canvas { width:100%; height:130px; display:block; border-radius:10px; touch-action:none; }
  .sig-ph { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#A0AEC0; font-size:14px; pointer-events:none; }
  .btn { width:100%; padding:14px; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; }
  .btn-blue { background:#2B6CB0; } .btn-brown { background:#744210; } .btn-navy { background:#1A365D; }
  .btn-drive { background:#0F2A3D; }
  .btn:disabled { opacity:.6; }
  .btn-clear { margin-top:8px; background:none; border:1px solid #2B6CB0; color:#2B6CB0; border-radius:8px; padding:6px 16px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-test { margin-top:10px; background:#2F855A; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; }
  .rec { background:#fff; border:1px solid #D8E0EA; border-radius:10px; padding:11px 13px; margin-bottom:8px; }
  .rec .t { font-weight:700; color:#1A365D; font-size:14px; }
  .rec .d { color:#64748B; font-size:13px; margin-top:2px; }
  .rec img { height:34px; margin-top:6px; background:#fff; border:1px solid #D8E0EA; border-radius:6px; padding:2px; }
  .badge { background:#FC8181; color:#742A2A; font-size:11px; border-radius:8px; padding:1px 7px; margin-right:6px; }
  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:#1A365D; color:#fff; padding:11px 22px; border-radius:24px; font-size:14px; font-weight:600; box-shadow:0 4px 14px rgba(0,0,0,.25); z-index:50; display:none; }
  .hidden { display:none; }
</style>
</head>

var fsRows=[], ncRows=[], tab="fs";
var sigData={fs:"",nc:""};

function today(){return new Date().toISOString().slice(0,10);}
function $(id){return document.getElementById(id);}
function flash(m){var t=$("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none";},2600);}

// init
window.onload=function(){
  var sel=$("fs_point");
  for(var k in CONTROL_POINTS){var o=document.createElement("option");o.value=k;o.textContent=k;sel.appendChild(o);}
  $("fs_date").value=today(); $("nc_date").value=today();
  var saved=localStorage.getItem("haccp_fs"); if(saved) fsRows=JSON.parse(saved);
  var savedNc=localStorage.getItem("haccp_nc"); if(savedNc) ncRows=JSON.parse(savedNc);
  var u=localStorage.getItem("haccp_url")||DEFAULT_URL; $("sheetUrl").value=u; updateUrlStatus();
  $("sheetUrl").addEventListener("input",function(){localStorage.setItem("haccp_url",this.value.trim());updateUrlStatus();});
  initSig("fs"); initSig("nc");
  render();
};

function updateUrlStatus(){
  var u=$("sheetUrl").value.trim();
  $("urlStatus").textContent = u ? "☁ מחובר – כל רשומה תישלח אוטומטית לגיליון." : "הדבק את ה-URL כדי לחבר.";
  $("gear").style.background = u ? "#2F855A" : "rgba(255,255,255,.15)";
}
function toggleSettings(){var p=$("settingsPanel");p.style.display=(p.style.display==="none")?"block":"none";}

function switchTab(t){
  tab=t;
  $("tabFs").className=t==="fs"?"active":""; $("tabNc").className=t==="nc"?"active":"";
  $("formFs").className="card"+(t==="fs"?"":" hidden");
  $("formNc").className="card"+(t==="nc"?"":" hidden");
  render();
}
function showInfo(){
  var cp=CONTROL_POINTS[$("fs_point").value];
  var box=$("fs_info");
  if(cp){box.className="info";box.innerHTML="<b>סיווג:</b> "+cp.cls+" · <b>שלב:</b> "+cp.stage+" · <b>סכנה:</b> "+cp.hazard+"<br><b>גבול קריטי:</b> "+cp.limit;}
  else{box.className="info hidden";}
}

// signature pads
function initSig(pre){
  var c=$(pre+"_sig"), ctx=c.getContext("2d"), draw=false, lx=0, ly=0;
  var r=window.devicePixelRatio||1, rect=c.getBoundingClientRect();
  c.width=rect.width*r; c.height=rect.height*r; ctx.scale(r,r);
  ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#1A202C";
  function pos(e){var rr=c.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-rr.left,y:t.clientY-rr.top};}
  function start(e){e.preventDefault();draw=true;var p=pos(e);lx=p.x;ly=p.y;}
  function move(e){if(!draw)return;e.preventDefault();var p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;$(pre+"_sig_ph").style.display="none";}
  function end(){if(!draw)return;draw=false;sigData[pre]=c.toDataURL("image/png");}
  c.addEventListener("mousedown",start);c.addEventListener("mousemove",move);c.addEventListener("mouseup",end);c.addEventListener("mouseleave",end);
  c.addEventListener("touchstart",start);c.addEventListener("touchmove",move);c.addEventListener("touchend",end);
}
function clearSig(pre){
  var c=$(pre+"_sig"),ctx=c.getContext("2d");ctx.clearRect(0,0,c.width,c.height);sigData[pre]="";$(pre+"_sig_ph").style.display="block";
}

// send to Google Sheets
function sendToSheet(type,headers,values){
  var url=$("sheetUrl").value.trim();
  if(!url) return Promise.resolve({ok:false,skipped:true});
  return fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify({type:type,headers:headers,values:values})})
    .then(function(){return {ok:true};})
    .catch(function(e){return {ok:false,error:String(e)};});
}
function testConn(){
  var url=$("sheetUrl").value.trim();
  if(!url){flash("הדבק קודם את הלינק");return;}
  sendToSheet("fs",FS_HEADERS,[today(),"בדיקת חיבור","—","—","—","רשומת בדיקה – אפשר למחוק","—","—","לא","—","—","—","—","—","test"])
    .then(function(r){flash(r.ok?"נשלחה רשומת בדיקה – בדוק בגיליון ✓":"השליחה נכשלה");});
}

function addFs(){
  var pt=$("fs_point").value, desc=$("fs_desc").value.trim();
  if(!pt||!desc){flash("בחר נקודת בקרה ומלא תיאור");return;}
  var cp=CONTROL_POINTS[pt]||{};
  var rec={date:$("fs_date").value,point:pt,cls:cp.cls,stage:cp.stage,hazard:cp.hazard,desc:desc,limit:cp.limit,result:$("fs_result").value,dev:$("fs_dev").value,corr:$("fs_corr").value,resp:$("fs_resp").value,sig:sigData.fs,verify:cp.verify,record:cp.record,notes:$("fs_notes").value};
  fsRows.push(rec); localStorage.setItem("haccp_fs",JSON.stringify(fsRows));
  var vals=[rec.date,rec.point,cp.cls||"",cp.stage||"",cp.hazard||"",rec.desc,cp.limit||"",rec.result,rec.dev,rec.corr,rec.resp,rec.sig?"נחתם":"לא נחתם",cp.verify||"",cp.record||"",rec.notes];
  sendToSheet("fs",FS_HEADERS,vals).then(function(r){
    flash($("sheetUrl").value.trim()?(r.ok?"נשמר ונשלח לגיליון ✓":"נשמר מקומית · שגיאת סנכרון"):"נשמר ✓");
  });
  $("fs_desc").value="";$("fs_result").value="";$("fs_corr").value="";$("fs_resp").value="";$("fs_notes").value="";clearSig("fs");
  render();
}
function addNc(){
  var desc=$("nc_desc").value.trim();
  if(!desc){flash("מלא תיאור אי-התאמה");return;}
  var rec={date:$("nc_date").value,source:$("nc_source").value,domain:$("nc_domain").value,desc:desc,impact:$("nc_impact").value,imm:$("nc_imm").value,corr:$("nc_corr").value,prev:$("nc_prev").value,resp:$("nc_resp").value,sig:sigData.nc,status:$("nc_status").value,notes:$("nc_notes").value};
  ncRows.push(rec); localStorage.setItem("haccp_nc",JSON.stringify(ncRows));
  var vals=[rec.date,rec.source,rec.domain,rec.desc,rec.impact,rec.imm,rec.corr,rec.prev,rec.resp,rec.sig?"נחתם":"לא נחתם",rec.status,rec.notes];
  sendToSheet("nc",NC_HEADERS,vals).then(function(r){
    flash($("sheetUrl").value.trim()?(r.ok?"נשמר ונשלח לגיליון ✓":"נשמר מקומית · שגיאת סנכרון"):"נשמר ✓");
  });
  $("nc_desc").value="";$("nc_impact").value="";$("nc_imm").value="";$("nc_corr").value="";$("nc_prev").value="";$("nc_resp").value="";$("nc_notes").value="";clearSig("nc");
  render();
}

function render(){
  var rows=tab==="fs"?fsRows:ncRows, html="";
  if(rows.length){
    html+='<div style="font-size:13px;font-weight:700;color:#64748B;margin-bottom:8px">יומן מצטבר – '+rows.length+' רשומות</div>';
    for(var i=0;i<rows.length;i++){
      var r=rows[i], title, dev="";
      if(tab==="fs"){title=r.point; if(r.dev==="כן")dev='<span class="badge">חריגה</span>';}
      else{title=r.source+" · "+r.domain;}
      html+='<div class="rec"><div class="t">#'+(i+1)+' · '+title+dev+'</div><div class="d">'+r.date+' · '+(r.desc||"").slice(0,60)+'</div>'+(r.sig?'<img src="'+r.sig+'">':'')+'</div>';
    }
  }
  $("recList").innerHTML=html;
}

function buildWorkbook(){
  var wb=XLSX.utils.book_new();
  var fsData=fsRows.map(function(r,i){return {"מס'":i+1,"תאריך":r.date,"נקודת בקרה":r.point,"סיווג":r.cls,"שלב תהליך":r.stage,"סוג סכנה":r.hazard,"תיאור האירוע":r.desc,"גבול קריטי":r.limit,"תוצאת ניטור":r.result,"חריגה":r.dev,"פעולה מתקנת":r.corr,"אחראי":r.resp,"חתימה":r.sig?"נחתם":"לא נחתם","אימות":r.verify,"רשומה":r.record,"הערות":r.notes};});
  var ncData=ncRows.map(function(r,i){return {"מס'":i+1,"תאריך":r.date,"מקור":r.source,"תחום":r.domain,"תיאור":r.desc,"השפעה":r.impact,"פעולה מיידית":r.imm,"פעולה מתקנת":r.corr,"פעולה מונעת":r.prev,"אחראי":r.resp,"חתימה":r.sig?"נחתם":"לא נחתם","סטטוס":r.status,"הערות":r.notes};});
  var ws1=XLSX.utils.json_to_sheet(fsData.length?fsData:[{}]);
  var ws2=XLSX.utils.json_to_sheet(ncData.length?ncData:[{}]);
  XLSX.utils.book_append_sheet(wb,ws1,"יומן בטיחות מזון");
  XLSX.utils.book_append_sheet(wb,ws2,"יומן אי-התאמות");
  return {wb:wb, fileName:"HACCP_log_"+today()+".xlsx"};
}

function exportExcel(){
  var built=buildWorkbook();
  XLSX.writeFile(built.wb,built.fileName);
  flash("הקובץ יוצא ל-Excel ✓");
}

var DRIVE_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxVwVroBWIMEbV4d12nh_3C6CQsXFjZA2JqUNAnn7c_bPMB58nijph3j1hiRI5oygex/exec";

function saveToDrive(){
  var btn=$("driveBtn");
  btn.disabled=true;
  var originalText=btn.textContent;
  btn.textContent="שולח לדרייב...";
  var built=buildWorkbook();
  var base64=XLSX.write(built.wb,{bookType:"xlsx",type:"base64"});
  var payload=JSON.stringify({
    base64:base64,
    mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    filename:built.fileName,
    folderId:"1fk5aGy2eXlVfjv-DmGXeFeI118lIboLz"
  });
  fetch(DRIVE_WEBHOOK_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:payload})
    .then(function(){ flash("הקובץ נשלח לתיקייה בדרייב"); })
    .catch(function(){ flash("שגיאה בשליחה לדרייב — נסו שוב"); })
    .finally(function(){ btn.disabled=false; btn.textContent=originalText; });
}
</script>
